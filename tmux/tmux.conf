set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set-window-option -g aggressive-resize on

set -g status-position          bottom
set -g status-style             "bg=#161616"
set -g status-left              "#[fg=#3ddbd9] #S  "
set -g status-left-length       20
set -g status-interval          30
set -g status-right             "#{?client_prefix,#[fg=#3ddbd9] ^E ,}#{?window_zoomed_flag,#[fg=#ee5396] Z ,}#[fg=#525252] #{b:pane_current_path}  %I:%M %p "
set -g status-right-length      60
set -g window-status-separator  ""
set -g window-status-format     "#[fg=#525252,bg=#161616] #W "
set -g window-status-current-format "#[fg=#3ddbd9,bg=#161616] #W "
set -g pane-border-style        "fg=#262626"
set -g pane-active-border-style "fg=#3ddbd9"
set -g message-style            "fg=#3ddbd9 bg=#161616"

set-option -g repeat-time 0
set -g renumber-windows   on
set -g allow-rename       off

set -g update-environment -r
set -g escape-time        0
set -g status-keys        emacs

set -g pane-border-indicators colour
set -g pane-border-lines      heavy
set -g detach-on-destroy      off
set -g set-clipboard          external

set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind  s      popup        -EE "tmux list-sessions -F '#S' | fzf | xargs -r tmux switch-client -t"
bind  c      new-window   -c    "#{pane_current_path}"
bind  %      split-window -h -c "#{pane_current_path}"
bind '"'     split-window -v -c "#{pane_current_path}"

bind R source-file ~/.config/tmux/tmux.conf \; display-message 'Sourced config!'

bind C-p previous-window
bind C-n next-window
bind -n M-up    select-pane  -U
bind -n M-down  select-pane  -D
bind -n M-left  select-pane  -L
bind -n M-right select-pane  -R

bind -n M-n     select-window  -t 0
bind -n M-e     select-window  -t 1
bind -n M-i     select-window  -t 2
bind -n M-o     select-window  -t 3

set -g default-terminal "tmux-256color"
set-option -sa terminal-features ',ghostty:RGB'
set-option -ga terminal-features ",ghostty:usstyle"
